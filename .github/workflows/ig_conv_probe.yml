name: IG Conversations Probe (one-time)
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe conversations endpoint limits
        env:
          TOK: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          for Q in "limit=10&fields=id,updated_time" "limit=5&fields=id,updated_time" "limit=3&fields=id,updated_time" "limit=2&fields=id,updated_time" "fields=id" "limit=5"; do
            echo "── $Q ──"
            curl -s "https://graph.facebook.com/v21.0/me/conversations?platform=instagram&$Q&access_token=$TOK" | head -c 400
            echo ""
          done
