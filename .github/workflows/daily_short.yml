name: Daily YouTube Short

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (skip Veo clips + YouTube upload = free run)'
        required: false
        type: boolean
        default: false
      skip_clips:
        description: 'Skip Veo clips only (use placeholders but still upload to YouTube)'
        required: false
        type: boolean
        default: false

jobs:
  create-and-upload:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick ffmpeg fonts-noto-core
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python packages
        run: pip install -q -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          mkdir -p /tmp/yt_shorts
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > /tmp/yt_shorts/youtube_token.json
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > /tmp/yt_shorts/client_secret.json

      - name: Copy repo background music
        run: |
          mkdir -p /tmp/yt_shorts/bg_music
          cp -n bg_music/*.mp3 /tmp/yt_shorts/bg_music/ 2>/dev/null || true
          cp -n bg_music/*.wav /tmp/yt_shorts/bg_music/ 2>/dev/null || true

      - name: Run Daily Short Generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
          SKIP_CLIPS: ${{ github.event.inputs.skip_clips }}
          OAUTHLIB_INSECURE_TRANSPORT: '1'
        run: python daily_short.py

      - name: Save updated topic history
        if: always()
        run: |
          git config user.name "YT Shorts Bot"
          git config user.email "bot@sale91.com"
          git add topic_history.json || true
          git commit -m "Update topic history [skip ci]" || true
          git push || true

      - name: Upload test video
        if: ${{ github.event.inputs.test_mode == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-video
          path: |
            /tmp/yt_shorts/SHORT_*.mp4
            /tmp/yt_shorts/thumbnail_*.png
          retention-days: 3

      - name: Save video for retry (on upload failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-upload-video
          path: |
            /tmp/yt_shorts/SHORT_*.mp4
            /tmp/yt_shorts/thumbnail_*.png
            /tmp/yt_shorts/upload_meta.json
          retention-days: 3
          if-no-files-found: ignore
