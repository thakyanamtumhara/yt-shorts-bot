name: Daily YouTube Short

on:
  schedule:
    # Mon-Sat 12:00 UTC = 5:30 PM IST. Sunday is intentionally skipped — the
    # sunday_recap.yml workflow takes over on Sundays, recapping the user's
    # Saturday main-channel upload as that day's content instead of running
    # the autonomous Veo pipeline (saves ~$7.58/Sun in Veo costs).
    - cron: '0 12 * * 1-6'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (skip Veo clips + YouTube upload = free run)'
        required: false
        type: boolean
        default: false
      skip_clips:
        description: 'Skip Veo clips only (use placeholders but still upload to YouTube)'
        required: false
        type: boolean
        default: false
      single_veo_test:
        description: 'Single Veo test (1 real clip + 4 blank — full upload pipeline, saves ~80% Veo cost)'
        required: false
        type: boolean
        default: false
      new_test_mode:
        description: 'New Test Mode (skip Veo clips, YouTube=unlisted, Instagram=no publish, no blog)'
        required: false
        type: boolean
        default: false
      test_thumbnail:
        description: 'Test AI thumbnail only (no video/upload — just generates thumbnail and saves as artifact)'
        required: false
        type: boolean
        default: false
      thumbnail_script:
        description: 'Custom script text for thumbnail (Hinglish — the voiceover script)'
        required: false
        type: string
        default: ''
      thumbnail_topic:
        description: 'Custom topic for thumbnail (e.g. "₹49 mein plain t-shirt wholesale")'
        required: false
        type: string
        default: ''
      thumbnail_base_image:
        description: 'Base image URL for thumbnail (paste any public image URL — used as background frame)'
        required: false
        type: string
        default: ''

concurrency:
  group: daily-short-generation
  cancel-in-progress: true

jobs:
  create-and-upload:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          # Kill background apt processes that hold the lock on GitHub runners
          sudo killall -9 apt-get apt unattended-upgr 2>/dev/null || true
          sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock
          sudo dpkg --configure -a 2>/dev/null || true
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq imagemagick ffmpeg fonts-noto-core fonts-freefont-ttf
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python packages
        run: pip install -q -r requirements.txt

      - name: Restore YouTube credentials
        run: |
          mkdir -p /tmp/yt_shorts
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > /tmp/yt_shorts/youtube_token.json
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > /tmp/yt_shorts/client_secret.json

      - name: Run Daily Short Generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REDDIT_DRAFTS_PAT: ${{ secrets.REDDIT_DRAFTS_PAT }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
          SKIP_CLIPS: ${{ github.event.inputs.skip_clips }}
          SINGLE_VEO_TEST: ${{ github.event.inputs.single_veo_test }}
          NEW_TEST_MODE: ${{ github.event.inputs.new_test_mode }}
          YOUTUBE_API_KEY_1: ${{ secrets.YOUTUBE_API_KEY_1 }}
          CHANNEL_ID_2: ${{ secrets.CHANNEL_ID_2 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'ap-south-1'
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OAUTHLIB_INSECURE_TRANSPORT: '1'
          TEST_THUMBNAIL: ${{ github.event.inputs.test_thumbnail }}
          THUMBNAIL_SCRIPT: ${{ github.event.inputs.thumbnail_script }}
          THUMBNAIL_TOPIC: ${{ github.event.inputs.thumbnail_topic }}
          THUMBNAIL_BASE_IMAGE: ${{ github.event.inputs.thumbnail_base_image }}
        run: |
          if [ "$TEST_THUMBNAIL" = "true" ]; then
            ARGS="--test-thumbnail"
            [ -n "$THUMBNAIL_TOPIC" ] && ARGS="$ARGS --topic \"$THUMBNAIL_TOPIC\""
            [ -n "$THUMBNAIL_SCRIPT" ] && ARGS="$ARGS --script \"$THUMBNAIL_SCRIPT\""
            # Download base image if URL provided
            if [ -n "$THUMBNAIL_BASE_IMAGE" ]; then
              echo "📥 Downloading base image..."
              curl -sL "$THUMBNAIL_BASE_IMAGE" -o /tmp/yt_shorts/base_frame.png
              ARGS="$ARGS --base-image /tmp/yt_shorts/base_frame.png"
            fi
            eval python daily_short.py $ARGS
          else
            python daily_short.py
          fi

      - name: Save updated tracking files
        if: always()
        run: |
          git config user.name "YT Shorts Bot"
          git config user.email "bot@sale91.com"
          git add topic_history.json || true
          git add cost_tracker.json || true
          git add engagement_history.json || true
          git add clip_history.json || true
          git add source_channel_insights.json || true
          git add blog_history.json || true
          git add ig_engagement_history.json || true
          git add reddit_drafts/ || true
          git add ig_drafts/ || true
          git commit -m "Update tracking files (topic + cost + engagement + clips + source insights + blog + IG + reddit) [skip ci]" || true
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload thumbnail test result
        if: ${{ github.event.inputs.test_thumbnail == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-thumbnail
          path: |
            /tmp/yt_shorts/thumbnail_*.png
            /tmp/yt_shorts/test_thumbnail_*.png
            /tmp/yt_shorts/thumb_base_*.png
          retention-days: 7

      - name: Upload test video
        if: ${{ github.event.inputs.test_mode == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-video
          path: |
            /tmp/yt_shorts/SHORT_*.mp4
            /tmp/yt_shorts/thumbnail_*.png
          retention-days: 3

      - name: Save video for retry (on upload failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-upload-video
          path: |
            /tmp/yt_shorts/SHORT_*.mp4
            /tmp/yt_shorts/thumbnail_*.png
            /tmp/yt_shorts/upload_meta.json
          retention-days: 3
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::❌ Daily Short pipeline FAILED! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Skip if an open bot-failure issue already exists
          EXISTING=$(gh issue list --label "bot-failure" --state open --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — adding comment instead"
            gh issue comment "$EXISTING" --body "Another failure at $(date -u +'%H:%M UTC %d %b').
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
          else
            gh issue create \
              --title "⚠️ Daily Short failed — $(date -u +'%d %b %Y')" \
              --body "Pipeline failed at $(date -u +'%H:%M UTC').

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}

          Check logs for: Veo API errors, TTS failures, YouTube upload issues, or cost limit exceeded." \
              --label "bot-failure" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
