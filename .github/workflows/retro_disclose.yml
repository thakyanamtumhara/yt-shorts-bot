name: Retro AI-Disclosure Backfill

# Flags already-published bot videos with status.containsSyntheticMedia=true.
# Quota-aware (videos.update = 50 units, shared 10k/day bucket) and idempotent:
# run with default max_updates=100, then again the next day until pending: 0.

on:
  workflow_dispatch:
    inputs:
      max_updates:
        description: 'Max videos.update calls this run (50 quota units each)'
        required: false
        default: '100'
      dry_run:
        description: 'true = only list what would change, write nothing'
        required: false
        default: 'false'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -q google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Materialize YouTube token
        run: |
          mkdir -p /tmp/yt_shorts
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > /tmp/yt_shorts/youtube_token.json

      - name: Backfill disclosure flags
        env:
          MAX_UPDATES: ${{ inputs.max_updates }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: python3 retro_disclose.py
