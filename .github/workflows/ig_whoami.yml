name: IG Token Whoami (which app + scopes + expiry)

# Diagnostic: prints which Meta app issued INSTAGRAM_ACCESS_TOKEN, the granted
# scopes, expiry, and the IG account it acts as. Never prints the token itself.

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect token
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          IG_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          python3 - << 'PY'
          import json, os, urllib.request, urllib.parse

          tok = os.environ["IG_TOKEN"].strip()
          app_id = os.environ.get("FB_APP_ID", "").strip()
          app_secret = os.environ.get("FB_APP_SECRET", "").strip()
          ig_id = os.environ.get("IG_BUSINESS_ID", "").strip()

          def get(url):
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  return {"http_error": e.code, "body": json.loads(e.read().decode() or "{}")}

          print("── debug_token (via FB_APP_ID app credentials) ──")
          if app_id and app_secret:
              q = urllib.parse.urlencode({"input_token": tok, "access_token": f"{app_id}|{app_secret}"})
              d = get(f"https://graph.facebook.com/v21.0/debug_token?{q}")
              data = d.get("data", d)
              for k in ("app_id", "application", "type", "issued_at", "expires_at",
                        "data_access_expires_at", "is_valid", "scopes", "granular_scopes",
                        "user_id", "profile_id"):
                  if k in data:
                      print(f"  {k}: {data[k]}")
              if "http_error" in d:
                  print(f"  debug_token failed: {d}")
                  print("  (means the token was NOT issued by the app in FB_APP_ID secret)")
          else:
              print("  FB_APP_ID/FB_APP_SECRET secrets missing")

          print("── token acts as (graph.instagram.com/me) ──")
          q = urllib.parse.urlencode({"fields": "id,user_id,username,account_type", "access_token": tok})
          print(" ", get(f"https://graph.instagram.com/v21.0/me?{q}"))

          if ig_id:
              print("── IG business account (graph.facebook.com path) ──")
              q = urllib.parse.urlencode({"fields": "username,name,followers_count", "access_token": tok})
              print(" ", get(f"https://graph.facebook.com/v21.0/{ig_id}?{q}"))

              print("── online_followers insight test (needs manage_insights + 100 followers) ──")
              q = urllib.parse.urlencode({"metric": "online_followers", "period": "lifetime", "access_token": tok})
              r = get(f"https://graph.facebook.com/v21.0/{ig_id}/insights?{q}")
              vals = r.get("data", [{}])[0].get("values", []) if isinstance(r.get("data"), list) and r.get("data") else []
              print("  WORKS ✅" if vals else f"  result: {str(r)[:400]}")

          print("── STORED FB_PAGE_ACCESS_TOKEN health ──")
          pt = os.environ.get("FB_PAGE_TOKEN", "").strip()
          if pt and app_id and app_secret:
              q = urllib.parse.urlencode({"input_token": pt, "access_token": f"{app_id}|{app_secret}"})
              d = get(f"https://graph.facebook.com/v21.0/debug_token?{q}").get("data", {})
              print("  type:", d.get("type"), "| valid:", d.get("is_valid"), "| expires_at:", d.get("expires_at"), "(0 = never)")
              data = urllib.parse.urlencode({"upload_phase": "start", "access_token": pt}).encode()
              try:
                  with urllib.request.urlopen(urllib.request.Request("https://graph.facebook.com/v21.0/1999594936994410/video_reels", data=data), timeout=20) as r:
                      print("  video_reels start with STORED token: WORKS ✅" if json.load(r).get("video_id") else "  no video_id?")
              except urllib.error.HTTPError as e:
                  print("  video_reels start FAILED:", e.code, e.read().decode()[:200])

          print("── FB Reels permission test: upload_phase=start on the Page (harmless, nothing publishes) ──")
          data = urllib.parse.urlencode({"upload_phase": "start", "access_token": tok}).encode()
          try:
              with urllib.request.urlopen(
                  urllib.request.Request("https://graph.facebook.com/v21.0/1999594936994410/video_reels", data=data),
                  timeout=20,
              ) as r:
                  d = json.load(r)
                  print("  WORKS ✅ — video_id created:", bool(d.get("video_id")))
          except urllib.error.HTTPError as e:
              print("  FAILED:", e.code, e.read().decode()[:300])
          PY
