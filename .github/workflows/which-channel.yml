name: Which Channel (diagnostic)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install google-auth google-auth-oauthlib google-api-python-client
      - env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          python - <<'PY'
          import os, json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          tok = json.loads(os.environ["YOUTUBE_TOKEN_JSON"])
          creds = Credentials.from_authorized_user_info(tok)
          yt = build("youtube","v3",credentials=creds)
          r = yt.channels().list(part="id,snippet", mine=True).execute()
          for it in r.get("items",[]):
              print("CHANNEL_ID:", it["id"])
              print("CHANNEL_TITLE:", it["snippet"]["title"])
          print("SCOPES:", tok.get("scopes"))
          PY
