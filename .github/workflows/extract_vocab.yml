name: Extract Source Vocab

# Downloads the user's 11 original YouTube videos via yt-dlp, transcribes each
# with OpenAI Whisper (language=hi), and analyses what Hindi/English words
# appear in the user's actual speech that aren't yet in the bot's TTS map
# or English allowlist. Outputs gap lists for human review.
#
# One-shot, manual trigger. Used to enhance _TTS_HINGLISH_DEVANAGARI map
# with vocabulary specific to the user's natural speaking style.

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python deps
        run: pip install -q yt-dlp requests

      - name: Run vocab extraction
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 .github/extract_vocab.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-vocab
          path: |
            transcripts/
            vocab_analysis.json
          retention-days: 30
