name: Rebuild Blog Index

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo killall -9 apt-get apt unattended-upgr 2>/dev/null || true
          sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock
          sudo dpkg --configure -a 2>/dev/null || true
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq imagemagick ffmpeg fonts-noto-core

      - name: Install Python packages
        run: pip install -q -r requirements.txt

      - name: Rebuild & publish index
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: 'ap-south-1'
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: "dummy"
          OPENAI_API_KEY: "dummy"
          OAUTHLIB_INSECURE_TRANSPORT: '1'
        run: python rebuild_index.py
